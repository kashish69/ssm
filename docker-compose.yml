services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - backend_data:/data
    # Caddy is managed outside this repo; reverse_proxy it to 127.0.0.1:8000.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mosquitto:
        condition: service_healthy

  mosquitto:
    build: ./mosquitto
    restart: unless-stopped
    # Reads MQTT_SERVICE_* + DEVICE_SEEDS from .env; the image entrypoint builds
    # the password file from them on every boot (no manual mosquitto_passwd step).
    env_file: .env
    # Caddy is managed outside this repo; it terminates TLS and proxies to these.
    # 5335 = plain MQTT for the backend (internal); 9001 = MQTT-over-WebSocket
    # that Caddy exposes at https://<domain>/mqtt for Pi devices.
    ports:
      - "127.0.0.1:5335:5335"
      - "127.0.0.1:9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5335 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  backend_data:
  mosquitto_data:
