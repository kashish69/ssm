# Per-device topics, scoped automatically to the connecting username (%u == device_id).
# Applies to every authenticated user unless a more specific "user" block below overrides it.
pattern write devices/%u/status
pattern write devices/%u/evt/#
pattern read devices/%u/cmd/#

# Backend service account: full read on all device status/events, publish on all commands.
user backend-service
topic read devices/+/status
topic read devices/+/evt/#
topic write devices/+/cmd/#
