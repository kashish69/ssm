listener 5335
protocol mqtt

# TLS terminated by Caddy in front of this (layer4 TCP proxy -> 127.0.0.1:5335),
# same pattern as the backend on port 8000. Mosquitto itself speaks plain MQTT.

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/
log_dest stdout
