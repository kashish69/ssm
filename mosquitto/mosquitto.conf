listener 5335
protocol mqtt

# WebSocket listener for external/Pi clients: Caddy reverse-proxies the public
# https://<domain>/mqtt path to this, terminating TLS. Same cert as the backend,
# no extra open port. Auth/ACL below apply to both listeners.
listener 9001
protocol websockets

# TLS terminated by Caddy in front of this (reverse_proxy /mqtt -> 127.0.0.1:9001
# for Pi clients; backend talks plain MQTT to 127.0.0.1:5335). Mosquitto itself
# speaks plaintext; Caddy holds the cert.

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/
log_dest stdout
